site_name: patrick's blog
site_url: https://patrickmastorga.github.io/blog/

hooks:
  - hooks.py

theme:
  name: material
  features:
    - navigation.indexes   # Allows folders to have index landing pages
    - navigation.expand    # Keeps the side menu expanded nicely

plugins:
  - search
  - blog:
      blog_dir: .         # Roots the blog directly at the homepage
      categories_name: categories
      post_readtime: false
      archive: false

markdown_extensions:
  - pymdownx.arithmatex:  # Wraps math syntax for MathJax extraction
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_javascript:
  - mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js